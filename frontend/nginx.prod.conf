server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React Router用: 全てのパスをindex.htmlに流す
    location / {
        try_files $uri $uri/ /index.html;
    }

    # APIリクエストをバックエンドに転送
    # ECS サイドカーパターン: 同じタスク内のコンテナは localhost で通信できる
    location /todos {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://localhost:8000;
    }
}
